[build]
  # 静态文件发布目录
  publish = "."
  
  # 不需要构建命令
  command = ""

[functions]
  # Functions 目录改为 api
  directory = "api"
  
  # 启用 ESM 支持
  node_bundler = "esbuild"

# 重定向规则 - 让 /api/comments 指向 Netlify Functions
[[redirects]]
  from = "/api/comments"
  to = "/.netlify/functions/comments"
  status = 200
  force = true

# 环境变量在 Netlify Dashboard 中设置：
# DATABASE_URL = "postgresql://..."
# ADMIN_TOKEN = "your-secret-token"
